<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft AFK Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>Minecraft AFK Bot</h1>
    </div>
  </header>

  <nav id="tab-bar"></nav>

  <main id="content">

    <!-- ── GENERAL TAB ─────────────────────────────────────────────────────── -->
    <section id="general-panel" class="panel">
      <div class="general-cols">

        <section class="settings-panel">
          <h2>General settings</h2>

          <div class="section-group">
            <h3>Server (Global Defaults)</h3>
            <div class="row">
              <label>Host<input id="host" type="text" placeholder="play.example.com"></label>
              <label class="narrow">Port<input id="port" type="number" min="1" max="65535"></label>
            </div>
            <label>Version<input id="version" type="text"></label>
          </div>

          <div class="section-group">
            <h3>AFK Position
              <label class="toggle">
                <input id="position-enabled" type="checkbox">
                <span class="slider"></span>
              </label>
            </h3>
            <div class="sub-fields">
              <div class="row three">
                <label>X<input id="pos-x" type="number" step="0.1"></label>
                <label>Y<input id="pos-y" type="number" step="0.1"></label>
                <label>Z<input id="pos-z" type="number" step="0.1"></label>
              </div>
              <div class="row two">
                <label>Yaw<input id="pos-yaw" type="number" step="1"></label>
                <label>Pitch<input id="pos-pitch" type="number" step="1"></label>
              </div>
            </div>
          </div>

          <div class="section-group">
            <h3>Anti-AFK
              <label class="toggle">
                <input id="antiafk-enabled" type="checkbox">
                <span class="slider"></span>
              </label>
            </h3>
            <label>Interval (ms)<input id="antiafk-interval" type="number" min="1000" step="1000"></label>
          </div>

          <div class="section-group">
            <h3>Auto-Reconnect
              <label class="toggle">
                <input id="reconnect-enabled" type="checkbox">
                <span class="slider"></span>
              </label>
            </h3>
            <label>Delay (seconds)<input id="reconnect-delay" type="number" min="1" max="3600"></label>
          </div>

          <button id="btn-save" class="btn btn-secondary">Save Settings</button>
          <p id="save-msg" class="save-msg"></p>
        </section>

        <section class="preview-panel">
          <div class="preview-header">
            <h2>Accounts</h2>
            <label class="preview-size-label">Preview size
              <input id="preview-size" type="range" min="140" max="440" value="220">
            </label>
          </div>
          <div id="preview-grid"></div>
        </section>

      </div>
    </section>

    <!-- ── ACCOUNT TAB (rendered dynamically) ──────────────────────────────── -->
    <section id="account-panel" class="panel" hidden></section>

    <!-- ── NEW ACCOUNT TAB (rendered dynamically) ──────────────────────────── -->
    <section id="draft-panel" class="panel" hidden></section>

  </main>

  <script src="app.js"></script>
</body>
</html>
