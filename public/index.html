<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mineflayer Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top bar (static) -->
  <div class="topbar">
    <div class="brand-mark"><i></i></div>
    <div class="brand-text">
      <span class="brand-title">Mineflayer Control</span>
      <span class="brand-sub">webgui · v2.4</span>
    </div>
    <div class="spacer"></div>
    <div class="online-pill"><span class="dot"></span><span id="online-label">0 online · 0 total</span></div>
    <button class="icon-btn" id="appearance-btn" title="Appearance" aria-label="Appearance">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle><path d="M12 2a10 10 0 0 1 7.07 17.07M12 2A10 10 0 0 0 4.93 19.07" stroke-dasharray="4 2"></path></svg>
    </button>
  </div>

  <!-- Appearance panel mounts here -->
  <div id="appearance-mount"></div>

  <!-- Tab strip -->
  <div class="tabstrip" id="tabstrip"></div>

  <!-- Workspace (settings + right pane) -->
  <div class="workspace">
    <div class="settings" id="settings"></div>
    <div id="right-pane-mount" style="flex:1 1 auto;min-width:0;display:flex"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
