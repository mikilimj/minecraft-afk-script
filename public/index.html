<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft AFK Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>Minecraft AFK Bot</h1>
    </div>
  </header>

  <main>
    <section class="settings-panel">

      <div class="section-group">
        <h3>Server (Global Defaults)</h3>
        <div class="row">
          <label>Host<input id="host" type="text" placeholder="play.example.com"></label>
          <label class="narrow">Port<input id="port" type="number" min="1" max="65535"></label>
        </div>
        <label>Version<input id="version" type="text"></label>
      </div>

      <div class="section-group">
        <h3>AFK Position
          <label class="toggle">
            <input id="position-enabled" type="checkbox">
            <span class="slider"></span>
          </label>
        </h3>
        <div class="sub-fields">
          <div class="row three">
            <label>X<input id="pos-x" type="number" step="0.1"></label>
            <label>Y<input id="pos-y" type="number" step="0.1"></label>
            <label>Z<input id="pos-z" type="number" step="0.1"></label>
          </div>
          <div class="row two">
            <label>Yaw<input id="pos-yaw" type="number" step="1"></label>
            <label>Pitch<input id="pos-pitch" type="number" step="1"></label>
          </div>
        </div>
      </div>

      <div class="section-group">
        <h3>Anti-AFK
          <label class="toggle">
            <input id="antiafk-enabled" type="checkbox">
            <span class="slider"></span>
          </label>
        </h3>
        <label>Interval (ms)<input id="antiafk-interval" type="number" min="1000" step="1000"></label>
      </div>

      <div class="section-group">
        <h3>Auto-Reconnect
          <label class="toggle">
            <input id="reconnect-enabled" type="checkbox">
            <span class="slider"></span>
          </label>
        </h3>
        <label>Delay (seconds)<input id="reconnect-delay" type="number" min="1" max="3600"></label>
      </div>

      <button id="btn-save" class="btn btn-secondary">Save Settings</button>
      <p id="save-msg" class="save-msg"></p>

    </section>

    <section class="accounts-log-column">

      <section class="accounts-panel">
        <div class="accounts-header">
          <h2>Accounts</h2>
          <div>
            <button id="btn-add" class="btn btn-ghost">Add account</button>
            <button id="btn-start-all" class="btn btn-primary">Start all</button>
            <button id="btn-stop-all" class="btn btn-danger">Stop all</button>
          </div>
        </div>
        <div id="account-list"></div>
      </section>

      <section class="command-panel">
        <h2>Commands</h2>
        <div class="cmd-selector">
          <div class="cmd-selector-head">
            <span>Target bots</span>
            <div>
              <button id="cmd-select-all" class="btn btn-ghost">Select all</button>
              <button id="cmd-clear-all" class="btn btn-ghost">Clear all</button>
            </div>
          </div>
          <div id="cmd-bot-list" class="cmd-bot-list"></div>
        </div>

        <div class="cmd-group">
          <h3>Movement</h3>
          <div class="cmd-move-mode">
            <label><input type="radio" name="move-mode" value="pathfind" checked> Pathfind (XYZ)</label>
            <label><input type="radio" name="move-mode" value="manual"> Manual (WASD)</label>
          </div>
          <div id="cmd-pathfind" class="cmd-move-pane">
            <div class="row three">
              <label>X<input id="cmd-x" type="number" step="0.1" value="0"></label>
              <label>Y<input id="cmd-y" type="number" step="0.1" value="64"></label>
              <label>Z<input id="cmd-z" type="number" step="0.1" value="0"></label>
            </div>
            <button id="cmd-go" class="btn btn-primary">Go</button>
          </div>
          <div id="cmd-manual" class="cmd-move-pane" style="display:none">
            <div class="wasd-grid">
              <button class="wasd" data-key="forward">W</button>
              <button class="wasd" data-key="left">A</button>
              <button class="wasd" data-key="back">S</button>
              <button class="wasd" data-key="right">D</button>
              <button class="wasd" data-key="jump">Jump</button>
              <button class="wasd" data-key="sneak">Sneak</button>
              <button class="wasd" data-key="sprint">Sprint</button>
            </div>
            <button id="cmd-stop-move" class="btn btn-danger">Stop moving</button>
          </div>
        </div>

        <div class="cmd-group">
          <h3>Chat / command</h3>
          <div class="row">
            <input id="cmd-chat" type="text" placeholder="/say hello or plain chat">
            <button id="cmd-send" class="btn btn-primary">Send</button>
          </div>
        </div>

        <div class="cmd-group">
          <h3>Attack</h3>
          <div class="row">
            <input id="cmd-attack-target" type="text" placeholder="entity name (blank = nearest)">
            <button id="cmd-attack" class="btn btn-danger">Attack</button>
          </div>
        </div>

        <div class="cmd-group">
          <h3>Autoclicker</h3>
          <div class="row">
            <label class="narrow">Mode
              <select id="cmd-click-mode">
                <option value="left">Left (attack)</option>
                <option value="right">Right (use)</option>
              </select>
            </label>
            <label class="narrow">Interval (ms)<input id="cmd-click-interval" type="number" min="20" value="200"></label>
            <button id="cmd-click-start" class="btn btn-primary">Start</button>
            <button id="cmd-click-stop" class="btn btn-danger">Stop</button>
          </div>
        </div>
      </section>

      <section class="log-panel">
        <div class="log-header">
          <h2>Activity Log</h2>
          <button id="btn-clear-log" class="btn btn-ghost">Clear</button>
        </div>
        <div id="auth-banner" class="auth-banner" style="display:none">
          <div class="auth-banner-body">
            <div class="auth-banner-title">Microsoft login required — <span id="auth-account"></span></div>
            <div class="auth-banner-code" id="auth-code"></div>
            <div class="auth-banner-actions">
              <a id="auth-link" href="#" target="_blank" class="btn btn-primary auth-banner-btn">Open Microsoft login</a>
              <button id="auth-skip" class="btn btn-ghost">Skip</button>
            </div>
          </div>
          <button id="auth-dismiss" class="auth-banner-dismiss">×</button>
        </div>
        <div id="log" class="log-entries"></div>
      </section>

    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
