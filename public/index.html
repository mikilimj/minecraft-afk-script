<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft AFK Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>Minecraft AFK Bot</h1>
      <span id="status-badge" class="badge idle">● Idle</span>
    </div>
    <div class="header-right">
      <button id="btn-connect" class="btn btn-primary">Connect</button>
      <button id="btn-disconnect" class="btn btn-danger" disabled>Disconnect</button>
    </div>
  </header>

  <main>
    <section class="settings-panel">

      <div class="section-group">
        <h3>Server</h3>
        <div class="row">
          <label>Host<input id="host" type="text" placeholder="play.example.com"></label>
          <label class="narrow">Port<input id="port" type="number" min="1" max="65535"></label>
        </div>
        <label>Version<input id="version" type="text"></label>
      </div>

      <div class="section-group">
        <h3>Account</h3>
        <label>Username / Email<input id="username" type="text"></label>
        <label>Auth type
          <select id="auth">
            <option value="offline">Offline (cracked)</option>
            <option value="microsoft">Microsoft (premium)</option>
          </select>
        </label>
        <label>Password (for /login)<input id="password" type="password" placeholder="Leave empty to skip"></label>
      </div>

      <div class="section-group">
        <h3>AFK Position
          <label class="toggle">
            <input id="position-enabled" type="checkbox">
            <span class="slider"></span>
          </label>
        </h3>
        <div class="sub-fields">
          <div class="row three">
            <label>X<input id="pos-x" type="number" step="0.1"></label>
            <label>Y<input id="pos-y" type="number" step="0.1"></label>
            <label>Z<input id="pos-z" type="number" step="0.1"></label>
          </div>
          <div class="row two">
            <label>Yaw<input id="pos-yaw" type="number" step="1"></label>
            <label>Pitch<input id="pos-pitch" type="number" step="1"></label>
          </div>
        </div>
      </div>

      <div class="section-group">
        <h3>Anti-AFK
          <label class="toggle">
            <input id="antiafk-enabled" type="checkbox">
            <span class="slider"></span>
          </label>
        </h3>
        <label>Interval (ms)<input id="antiafk-interval" type="number" min="1000" step="1000"></label>
      </div>

      <div class="section-group">
        <h3>Auto-Reconnect
          <label class="toggle">
            <input id="reconnect-enabled" type="checkbox">
            <span class="slider"></span>
          </label>
        </h3>
        <label>Delay (seconds)<input id="reconnect-delay" type="number" min="1" max="3600"></label>
      </div>

      <button id="btn-save" class="btn btn-secondary">Save Settings</button>
      <p id="save-msg" class="save-msg"></p>

    </section>

    <section class="log-panel">
      <div class="log-header">
        <h2>Activity Log</h2>
        <button id="btn-clear-log" class="btn btn-ghost">Clear</button>
      </div>
      <div id="log" class="log-entries"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
